services:
  api:
    build: ./server
    container_name: hail
    restart: always
    ports:
      - "8810:8810"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/src
    command: ["npx", "nodemon", "app.js"]

  postgres:
    image: postgres:15-alpine
    container_name: hp
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: redis:alpine
    container_name: hail_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
